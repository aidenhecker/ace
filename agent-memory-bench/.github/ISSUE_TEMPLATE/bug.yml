name: Bug report
description: Something is broken or a number looks wrong
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you ran and what went wrong.
      placeholder: "agent-memory-bench run --corpus hn_top → ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version + Python
      placeholder: "agent-memory-bench 0.1.0, Python 3.12"
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Output / traceback
      render: shell

name: benchmark

# Run the full benchmark against the frozen snapshots and publish the JSON as an
# artifact. Manual trigger + monthly, so the badge reflects a green reproducible
# run. Does not commit results (no bot commits) — refresh `results/` via a PR.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"  # 06:00 UTC, 1st of each month

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run benchmark (frozen snapshots)
        run: agent-memory-bench run --out results/ci-run.json
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: results/ci-run.json

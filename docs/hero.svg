<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" width="760" height="330" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect x="0" y="0" width="760" height="330" rx="14" fill="#ffffff"/>
  <text x="32" y="40" font-size="20" font-weight="700" fill="#1b1b1f">Standing memory context per query — log scale (tokens)</text>
  <text x="32" y="62" font-size="13" fill="#6b6b76">raw and claude-mem grow with the corpus · ACE stays flat (~450) — that's the thesis</text>

  <!-- baseline -->
  <line x1="70" y1="272" x2="740" y2="272" stroke="#d9d9e0" stroke-width="1.5"/>

  <!-- ACE flat reference -->
  <line x1="70" y1="258" x2="740" y2="258" stroke="#00798c" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.55"/>
  <text x="700" y="253" font-size="11" fill="#00798c" text-anchor="end">ACE ≈ 450</text>

  <!-- group: anthropic_docs -->
  <rect x="110" y="61"  width="36" height="211" rx="3" fill="#d1495b"/>
  <rect x="154" y="236" width="36" height="36"  rx="3" fill="#edae49"/>
  <rect x="198" y="259" width="36" height="13"  rx="3" fill="#00798c"/>
  <text x="128" y="54"  font-size="11" fill="#d1495b" text-anchor="middle">224,377</text>
  <text x="172" y="229" font-size="11" fill="#b07d1f" text-anchor="middle">927</text>
  <text x="216" y="252" font-size="11" fill="#00798c" text-anchor="middle">446</text>
  <text x="172" y="290" font-size="12" fill="#3a3a42" text-anchor="middle" font-weight="600">anthropic_docs</text>
  <text x="172" y="306" font-size="11" fill="#8a8a94" text-anchor="middle">503× compression</text>

  <!-- group: kernel_log -->
  <rect x="320" y="126" width="36" height="146" rx="3" fill="#d1495b"/>
  <rect x="364" y="176" width="36" height="96"  rx="3" fill="#edae49"/>
  <rect x="408" y="258" width="36" height="14"  rx="3" fill="#00798c"/>
  <text x="338" y="119" font-size="11" fill="#d1495b" text-anchor="middle">29,130</text>
  <text x="382" y="169" font-size="11" fill="#b07d1f" text-anchor="middle">6,084</text>
  <text x="426" y="251" font-size="11" fill="#00798c" text-anchor="middle">454</text>
  <text x="382" y="290" font-size="12" fill="#3a3a42" text-anchor="middle" font-weight="600">kernel_log</text>
  <text x="382" y="306" font-size="11" fill="#8a8a94" text-anchor="middle">64× · ACE loses recall</text>

  <!-- group: hn_top -->
  <rect x="530" y="186" width="36" height="86" rx="3" fill="#d1495b"/>
  <rect x="574" y="217" width="36" height="55" rx="3" fill="#edae49"/>
  <rect x="618" y="258" width="36" height="14" rx="3" fill="#00798c"/>
  <text x="548" y="179" font-size="11" fill="#d1495b" text-anchor="middle">4,690</text>
  <text x="592" y="210" font-size="11" fill="#b07d1f" text-anchor="middle">1,765</text>
  <text x="636" y="251" font-size="11" fill="#00798c" text-anchor="middle">453</text>
  <text x="592" y="290" font-size="12" fill="#3a3a42" text-anchor="middle" font-weight="600">hn_top</text>
  <text x="592" y="306" font-size="11" fill="#8a8a94" text-anchor="middle">10× compression</text>

  <!-- legend -->
  <rect x="70" y="14" width="0" height="0"/>
  <g font-size="12" fill="#3a3a42">
    <rect x="560" y="22" width="12" height="12" rx="2" fill="#d1495b"/><text x="578" y="32">raw</text>
    <rect x="618" y="22" width="12" height="12" rx="2" fill="#edae49"/><text x="636" y="32">claude-mem</text>
    <rect x="712" y="22" width="12" height="12" rx="2" fill="#00798c"/><text x="730" y="32">ace</text>
  </g>
</svg>
